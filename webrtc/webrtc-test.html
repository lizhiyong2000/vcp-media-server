<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vcp-media-server WebRTC Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    fieldset { margin-bottom: 1rem; }
    label { display: block; margin: 0.4rem 0 0.2rem; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 0.4rem; }
    button { margin: 0.3rem 0.3rem 0.3rem 0; padding: 0.4rem 0.8rem; }
    video { width: 100%; max-width: 640px; background: #111; margin-top: 0.5rem; }
    #log { background: #f4f4f4; padding: 0.5rem; height: 160px; overflow: auto; font-size: 0.85rem; white-space: pre-wrap; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .col { flex: 1; min-width: 280px; }
  </style>
</head>
<body>
  <h1>vcp-media-server WebRTC 测试</h1>
  <p><strong>测试方式：</strong>可双页（A 推流、B 播放），也可<strong>同页</strong>先推流再播放。多页播放同一 <code>stream_id</code> 互不影响。播放时服务器会向推流端请求关键帧。</p>

  <fieldset>
    <legend>连接</legend>
    <label>信令地址</label>
    <input id="wsUrl" type="text" value="ws://127.0.0.1:9080/">
    <label>流 ID (stream_id)</label>
    <input id="streamId" type="text" value="webrtc_test">
    <button id="btnConnect">连接信令</button>
    <button id="btnDisconnect" disabled>断开</button>
  </fieldset>

  <div class="row">
    <div class="col">
      <fieldset>
        <legend>推流 (Publish)</legend>
        <button id="btnPublish" disabled>开始推流</button>
        <button id="btnStopPublish" disabled>停止推流</button>
        <video id="localVideo" autoplay muted playsinline></video>
      </fieldset>
    </div>
    <div class="col">
      <fieldset>
        <legend>播放 (Play)</legend>
        <button id="btnPlay" disabled>开始播放</button>
        <button id="btnStopPlay" disabled>停止播放</button>
        <video id="remoteVideo" autoplay muted playsinline controls></video>
      </fieldset>
    </div>
  </div>

  <fieldset>
    <legend>日志</legend>
    <div id="log"></div>
  </fieldset>

  <script>
    const $ = (id) => document.getElementById(id);
    const logEl = $('log');
    function log(msg) {
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.textContent += line + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      console.log(line);
    }

    let ws = null;
    let publishPc = null;
    let playPc = null;
    let localStream = null;
    let activePc = null; // deprecated: use negotiatingPc for answers
    let negotiatingPc = null; // PC currently waiting for SDP answer
    let keyframeTimer = null;
    let keyframeMethod = null; // 'generateKeyFrame' | 'setParameters' | 'replaceTrack' | null | 'none'
    let publishVideoSenderRef = null;
    let publishVideoTrackRef = null;
    let keyframeRequestChain = Promise.resolve();
    let playGeneration = 0;

    function publishVideoSender() {
      if (publishVideoSenderRef) return publishVideoSenderRef;
      const tr = publishPc?.getTransceivers().find(
        (t) => t.sender && (t.direction === 'sendonly' || t.currentDirection === 'sendonly')
      );
      return tr?.sender ?? publishPc?.getSenders().find((s) => s.track?.kind === 'video') ?? null;
    }

    // Chrome requires getParameters() immediately before every setParameters() call.
    function primePublishSenderParameters() {
      const sender = publishVideoSender();
      if (!sender) return;
      try {
        sender.getParameters();
      } catch (_) { /* not negotiated yet */ }
    }

    async function trySetParametersKeyFrame(sender) {
      const params = sender.getParameters();
      if (!params.encodings?.length) return false;
      await sender.setParameters(params, {
        encodingOptions: params.encodings.map(() => ({ keyFrame: true })),
      });
      return true;
    }

    function enqueueKeyframeRequest(label) {
      keyframeRequestChain = keyframeRequestChain
        .then(() => requestPublishKeyframe(label))
        .catch((e) => log(label + ': 关键帧队列错误 ' + e));
      return keyframeRequestChain;
    }

    async function requestPublishKeyframe(label) {
      if (!publishPc) {
        log(label + ': 无推流连接');
        return false;
      }
      if (keyframeMethod === 'none') return false;
      if (publishPc.connectionState !== 'connected') {
        return false;
      }
      const sender = publishVideoSender();
      if (!sender) {
        log(label + ': 无视频 sender');
        return false;
      }
      const videoTrack = publishVideoTrackRef ?? sender.track;
      if (!videoTrack || videoTrack.readyState !== 'live') {
        log(label + ': 视频 track 不可用');
        return false;
      }

      const tryGenerateKeyFrame = async () => {
        if (typeof sender.generateKeyFrame !== 'function') return false;
        await sender.generateKeyFrame();
        return true;
      };

      const tryReplaceTrack = async () => {
        log(label + ': 警告 — replaceTrack 会重置 RTP 时间戳，仅作兜底');
        await sender.replaceTrack(null);
        await new Promise((r) => setTimeout(r, 100));
        await sender.replaceTrack(videoTrack);
        return true;
      };

      const serverTriggered = label.includes('need-keyframe') || label.includes('need_keyframe');
      const allMethods = [
        ['generateKeyFrame', tryGenerateKeyFrame],
        ['setParameters', () => trySetParametersKeyFrame(sender)],
      ];
      if (serverTriggered) {
        allMethods.push(['replaceTrack', tryReplaceTrack]);
      }

      const run = async (name, fn) => {
        if (await fn()) return true;
        throw new Error('returned false');
      };

      const order = keyframeMethod
        ? [
            ...allMethods.filter(([n]) => n === keyframeMethod),
            ...allMethods.filter(([n]) => n !== keyframeMethod),
          ]
        : allMethods;

      for (const [name, fn] of order) {
        try {
          await run(name, fn);
          if (keyframeMethod !== name) {
            keyframeMethod = name;
            log(label + ': 关键帧请求方式 → ' + name);
          }
          return true;
        } catch (e) {
          if (keyframeMethod === name) {
            log(label + ': ' + name + ' 失败 ' + e + '，尝试其他方式');
            keyframeMethod = null;
          } else if (!keyframeMethod) {
            log(label + ': ' + name + ' 不可用 ' + e);
          }
        }
      }

      if (!keyframeMethod) {
        log(label + ': 无法请求关键帧，依赖编码器默认 GOP');
        keyframeMethod = 'none';
      }
      return false;
    }

    function startPublishKeyframeInterval() {
      stopPublishKeyframeInterval();
      enqueueKeyframeRequest('Publish-connected');
      keyframeTimer = setInterval(() => {
        if (keyframeMethod === 'generateKeyFrame' || keyframeMethod === 'setParameters') {
          enqueueKeyframeRequest('Publish-interval');
        }
      }, 3000);
    }

    function stopPublishKeyframeInterval() {
      if (keyframeTimer) {
        clearInterval(keyframeTimer);
        keyframeTimer = null;
      }
    }

    function resetPublishState(reason, notifyServer = false) {
      const streamId = $('streamId').value.trim();
      stopPublishKeyframeInterval();
      keyframeMethod = null;
      publishVideoSenderRef = null;
      publishVideoTrackRef = null;
      keyframeRequestChain = Promise.resolve();
      if (negotiatingPc === publishPc) negotiatingPc = null;
      if (activePc === publishPc) activePc = null;
      if (publishPc) {
        try { publishPc.close(); } catch (_) {}
        publishPc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach((t) => t.stop());
        localStream = null;
      }
      $('localVideo').srcObject = null;
      $('btnPublish').disabled = !(ws && ws.readyState === WebSocket.OPEN);
      $('btnStopPublish').disabled = true;
      if (notifyServer && streamId) wsSend({ type: 'stop_publish', stream_id: streamId });
      if (reason) log(reason);
    }

    function isPublishFailure(message) {
      return /publish rejected|publish failed|推流/i.test(message || '')
        || negotiatingPc === publishPc;
    }

    function clearRemoteVideo() {
      const video = $('remoteVideo');
      const stream = video.srcObject;
      if (stream && typeof stream.getTracks === 'function') {
        stream.getTracks().forEach((track) => {
          try { track.stop(); } catch (_) {}
          try { stream.removeTrack(track); } catch (_) {}
        });
      }
      try { video.pause(); } catch (_) {}
      video.removeAttribute('src');
      video.srcObject = null;
      video.load();
    }

    function resetPlayState(reason, notifyServer = false) {
      const streamId = $('streamId').value.trim();
      playGeneration += 1;
      pendingServerIce.length = 0;
      if (negotiatingPc === playPc) negotiatingPc = null;
      if (activePc === playPc) activePc = null;
      if (notifyServer && streamId) wsSend({ type: 'stop_play', stream_id: streamId });
      if (playPc) {
        try { playPc.ontrack = null; } catch (_) {}
        try { playPc.close(); } catch (_) {}
        playPc = null;
      }
      clearRemoteVideo();
      $('btnPlay').disabled = !(ws && ws.readyState === WebSocket.OPEN);
      $('btnStopPlay').disabled = true;
      if (reason) log(reason);
    }

    function wsSend(obj) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WebSocket 未连接');
        return;
      }
      ws.send(JSON.stringify(obj));
    }

    function h264CodecPreferences() {
      const caps = RTCRtpSender.getCapabilities('video');
      if (!caps) return [];
      const h264 = caps.codecs.filter((c) => c.mimeType.toLowerCase() === 'video/h264');
      const aux = caps.codecs.filter((c) => {
        const m = c.mimeType.toLowerCase();
        return m === 'video/rtx' || m === 'video/red' || m === 'video/ulpfec' || m === 'video/flexfec-03';
      });
      return [...h264, ...aux];
    }

    let pendingServerIce = [];

    async function addIceToReadyPcs(ice) {
      const pcs = [playPc, publishPc].filter((pc) => pc?.remoteDescription);
      if (!pcs.length) return false;
      for (const pc of pcs) {
        try {
          await pc.addIceCandidate(ice);
          return true;
        } catch (_) { /* ufrag/mline mismatch */ }
      }
      return false;
    }

    async function flushPendingServerIce() {
      const rest = [];
      for (const ice of pendingServerIce) {
        if (!(await addIceToReadyPcs(ice))) rest.push(ice);
      }
      pendingServerIce.length = 0;
      pendingServerIce.push(...rest);
    }

    async function addServerIceCandidate(msg) {
      const ice = {
        candidate: msg.candidate,
        sdpMid: msg.sdp_mid,
        sdpMLineIndex: msg.sdp_mline_index,
      };
      const pcs = [playPc, publishPc].filter(Boolean);
      if (!pcs.length) return;
      const ready = pcs.some((pc) => pc.remoteDescription);
      if (!ready) {
        pendingServerIce.push(ice);
        return;
      }
      if (!(await addIceToReadyPcs(ice))) {
        pendingServerIce.push(ice);
      }
    }

    function wireIce(pc, role) {
      pc.onicecandidate = (ev) => {
        if (!ev.candidate) return;
        wsSend({
          type: 'ice',
          candidate: ev.candidate.candidate,
          sdp_mid: ev.candidate.sdpMid,
          sdp_mline_index: ev.candidate.sdpMLineIndex,
        });
      };
      pc.onconnectionstatechange = () => log(`${role} PC state: ${pc.connectionState}`);
      pc.oniceconnectionstatechange = () => log(`${role} ICE state: ${pc.iceConnectionState}`);
    }

    $('btnConnect').onclick = () => {
      const url = $('wsUrl').value.trim();
      ws = new WebSocket(url);
      ws.onopen = () => {
        log('信令已连接: ' + url);
        $('btnConnect').disabled = true;
        $('btnDisconnect').disabled = false;
        $('btnPublish').disabled = false;
        $('btnPlay').disabled = false;
      };
      ws.onclose = () => {
        log('信令已断开');
        $('btnConnect').disabled = false;
        $('btnDisconnect').disabled = true;
        $('btnPublish').disabled = true;
        $('btnPlay').disabled = true;
      };
      ws.onerror = () => log('WebSocket 错误');
      ws.onmessage = async (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { log('无效 JSON: ' + ev.data); return; }
        if (msg.type === 'answer') {
          const pc = negotiatingPc;
          if (!pc) return;
          try {
            await pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp });
            negotiatingPc = null;
            log('收到 answer');
            await flushPendingServerIce();
          } catch (e) {
            if (pc === publishPc) {
              resetPublishState('推流失败: 设置远端 answer 失败 ' + e);
            } else {
              resetPlayState('播放失败: 设置远端 answer 失败 ' + e);
            }
          }
        } else if (msg.type === 'ice') {
          await addServerIceCandidate(msg);
        } else if (msg.type === 'need_keyframe') {
          enqueueKeyframeRequest('Server-need-keyframe');
        } else if (msg.type === 'error') {
          log('服务器错误: ' + msg.message);
          if (isPublishFailure(msg.message)) {
            resetPublishState('推流失败: ' + msg.message);
          }
        }
      };
    };

    $('btnDisconnect').onclick = () => {
      if (ws) ws.close();
      ws = null;
    };

    $('btnPublish').onclick = async () => {
      const streamId = $('streamId').value.trim();
      if (!streamId) return log('请填写 stream_id');
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, frameRate: 25 },
          audio: false,
        });
        $('localVideo').srcObject = localStream;
        publishPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        wireIce(publishPc, 'publish');
        publishPc.addEventListener('connectionstatechange', () => {
          if (publishPc?.connectionState === 'connected') {
            primePublishSenderParameters();
            startPublishKeyframeInterval();
          }
          if (publishPc?.connectionState === 'closed' || publishPc?.connectionState === 'failed') {
            stopPublishKeyframeInterval();
          }
        });
        const videoTrack = localStream.getVideoTracks()[0];
        publishVideoTrackRef = videoTrack;
        const pubTr = publishPc.addTransceiver(videoTrack, { direction: 'sendonly' });
        publishVideoSenderRef = pubTr.sender;
        const h264Prefs = h264CodecPreferences();
        if (h264Prefs.length) {
          pubTr.setCodecPreferences(h264Prefs);
          log('Publish: prefer H264 (' + h264Prefs.filter(c => c.mimeType.includes('H264')).length + ' codecs)');
        }
        const offer = await publishPc.createOffer({
          offerToReceiveAudio: false,
          offerToReceiveVideo: false,
        });
        await publishPc.setLocalDescription(offer);
        primePublishSenderParameters();
        negotiatingPc = publishPc;
        activePc = publishPc;
        wsSend({ type: 'publish', stream_id: streamId, sdp: offer.sdp });
        log('已发送 publish offer, stream_id=' + streamId);
        $('btnPublish').disabled = true;
        $('btnStopPublish').disabled = false;
      } catch (e) {
        resetPublishState('推流失败: ' + e);
      }
    };

    $('btnStopPublish').onclick = () => {
      const streamId = $('streamId').value.trim();
      resetPublishState('推流已停止', !!streamId);
      if (playPc) resetPlayState('推流已停止，同步停止播放', false);
    };

    $('btnPlay').onclick = async () => {
      const streamId = $('streamId').value.trim();
      if (!streamId) return log('请填写 stream_id');
      try {
        resetPlayState(null, false);
        const generation = playGeneration;
        playPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        const thisPc = playPc;
        wireIce(playPc, 'play');
        const playTr = playPc.addTransceiver('video', { direction: 'recvonly' });
        const h264Prefs = h264CodecPreferences();
        if (h264Prefs.length) {
          playTr.setCodecPreferences(h264Prefs);
          log('Play: prefer H264');
        }
        const remoteStream = new MediaStream();
        $('remoteVideo').srcObject = remoteStream;
        playPc.ontrack = (ev) => {
          if (generation !== playGeneration || thisPc !== playPc) {
            log('忽略旧播放连接的远端 track: ' + ev.track.kind);
            try { ev.track.stop(); } catch (_) {}
            return;
          }
          log('收到远端 track: ' + ev.track.kind + ' id=' + ev.track.id + ' readyState=' + ev.track.readyState);
          remoteStream.addTrack(ev.track);
          ev.track.onended = () => log('track ended: ' + ev.track.kind);
          ev.track.onmute = () => log('track muted: ' + ev.track.kind);
          ev.track.onunmute = () => {
            log('track unmuted: ' + ev.track.kind);
            $('remoteVideo').play().catch((e) => log('video.play(): ' + e));
          };
          $('remoteVideo').play().catch((e) => log('video.play(): ' + e));
        };
        const offer = await playPc.createOffer();
        await playPc.setLocalDescription(offer);
        negotiatingPc = playPc;
        activePc = playPc;
        wsSend({ type: 'play', stream_id: streamId, sdp: offer.sdp });
        log('已发送 play offer, stream_id=' + streamId);
        $('btnPlay').disabled = true;
        $('btnStopPlay').disabled = false;
      } catch (e) {
        resetPlayState('播放失败: ' + e);
      }
    };

    $('btnStopPlay').onclick = () => {
      const streamId = $('streamId').value.trim();
      resetPlayState('播放已停止', !!streamId);
    };
  </script>
</body>
</html>
