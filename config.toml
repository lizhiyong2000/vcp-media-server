[storage]
base_dir = "./saving"

[server.rtmp]
port = 1935

[server.rtsp]
port = 554

[server.webrtc]
port = 9080

[server.http]
port = 8081

[server.hls]
enabled = true
segment_duration = 1
max_segments = 1
output_dir = "hls"

[server.http_flv]
enabled = true

[record]
enabled = true
output_dir = "recordings"
default_format = "ts"
segment_duration_sec = 300
align_keyframe = true

[analysis]
enabled = true
default_sample_interval = 1
max_events_per_stream = 256
ffmpeg_path = "ffmpeg"
face_detection_dir = "./analysis"
face_detection_interval_ms = 1000
# Optional external detector. Enable per session with plugins=["face_detection"].
# The command is called as: <face_detector_command> <image_path>
# It must print JSON: {"faces":[{"x":0,"y":0,"width":100,"height":100,"confidence":0.9}]}
# face_detector_command = "./scripts/face_detect.py"

[snapshot]
enabled = true
output_dir = "snapshots"
ffmpeg_path = "ffmpeg"
wait_keyframe_ms = 1000

[log]
level = "info"
path = "./logs/media-server.log"
max_size_mb = 10
max_files = 5

[log.modules]
rtsp = "info"
core = "info"
webrtc = "info"
